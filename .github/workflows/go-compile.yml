name: Auto Compile Helper

on:
  push:
    branches: [ "master" ]
    # 只要这文件变了就重新编译
    paths:
      - 'py10-helper.go'
  workflow_dispatch: # 允许你在网页点按钮手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    # 必须添加这个权限，否则无法发布文件到 Release
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build Binary
      run: |
        # 强制静态编译，解决系统兼容性
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o py10-helper-linux-amd64 py10-helper.go
        CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o py10-helper-linux-arm64 py10-helper.go

    # 关键步骤：发布到固定 Release 页面 (tag 名为 latest)
    - name: Update Latest Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest
        files: py10-helper-linux-*
        # 即使标签已存在也强制覆盖文件
        overwrite: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
