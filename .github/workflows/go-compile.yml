name: Auto Compile Helper

on:
  push:
    branches: [ "master" ]
    paths:
      - 'py10-helper.go'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Build Binary
      run: |
        GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o py10-helper-linux-amd64 py10-helper.go
        GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o py10-helper-linux-arm64 py10-helper.go

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: py10-helper-binaries
        path: py10-helper-linux-*