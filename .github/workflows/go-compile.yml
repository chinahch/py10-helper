name: Auto Compile Helper

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须开启写入权限，否则无法发布 Release
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache: false  # 关闭缓存检查，消除那个黄色的 Restore cache 警告

    - name: Build Binary
      run: |
        # 强制静态编译，确保 GLIBC 兼容性
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o py10-helper-linux-amd64 py10-helper.go
        CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o py10-helper-linux-arm64 py10-helper.go

    - name: Update Latest Release
      uses: softprops/action-gh-release@v2  # 升级到 v2 版本，更稳定
      with:
        tag_name: latest
        name: "Latest Build"
        note: "自动化编译产生的最新二进制文件"
        files: |
          py10-helper-linux-amd64
          py10-helper-linux-arm64
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
